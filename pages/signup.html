<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sign Up — EvalIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>

</head>
<body>
<div class="auth-page">
  <div class="auth-box" style="max-width:420px">
    <div style="text-align:center;margin-bottom:20px">
      <div class="auth-mark">E</div>
      <div style="font-size:17px;font-weight:600;color:var(--gray7)">Create your account</div>
      <div style="font-size:12px;color:var(--gray5);margin-top:2px">Join EvalIQ — it's free to get started</div>
    </div>

    <div class="role-tabs">
      <div class="role-tab active">I'm an Instructor</div>
      <div class="role-tab">I'm a Student</div>
    </div>

    <div class="g2">
      <div class="form-group"><label class="form-label">First Name</label><input class="form-input" value="Muhammad" placeholder="First name"/></div>
      <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" value="Ehsan" placeholder="Last name"/></div>
    </div>
    <div class="form-group"><label class="form-label">Institutional Email</label><input class="form-input" value="m.ehsan@umt.edu.pk" type="email"/></div>
    <div class="form-group">
      <label class="form-label">Department</label>
      <select class="form-input">
        <option>Software Engineering</option>
        <option>Computer Science</option>
        <option>Information Technology</option>
        <option>Electrical Engineering</option>
      </select>
    </div>
    <div class="g2">
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" value="••••••••"/></div>
      <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" type="password" value="••••••••"/></div>
    </div>
    <a class="btn btn-primary btn-full" href="dashboard.html">Create Account →</a>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--gray5)">
      Already have an account? <a href="login.html" style="color:var(--blue);font-weight:500">Sign in</a>
    </div>
    <div style="margin-top:12px;font-size:10.5px;color:var(--gray5);text-align:center;line-height:1.6">
      ⚠ Instructor accounts require Admin approval before activation
    </div>
  </div>
</div>
<script src="../js/app.js" defer></script>
</body>
</html>
