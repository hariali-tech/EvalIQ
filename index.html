<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EvalIQ — AI-Powered Short Answer Grading</title>
<meta http-equiv="refresh" content="2; url=pages/login.html"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .splash{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,#1A3A6B 100%)}
  .splash-box{text-align:center;color:#fff}
  .splash-mark{width:64px;height:64px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;margin:0 auto 16px}
  .splash-title{font-size:20px;font-weight:600;margin-bottom:6px}
  .splash-sub{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:22px}
  .splash-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r-sm);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:13px;font-weight:500;transition:background .15s}
  .splash-btn:hover{background:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="splash">
  <div class="splash-box">
    <div class="splash-mark">E</div>
    <div class="splash-title">EvalIQ</div>
    <div class="splash-sub">AI-Powered Short Answer Grading System · UMT</div>
    <a class="splash-btn" href="pages/login.html">Enter EvalIQ →</a>
  </div>
</div>
</body>
</html>
